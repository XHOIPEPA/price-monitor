services:

  # ======================================================
  # KAFKA (KRaft mode - pa ZooKeeper, Kafka 4.x)
  # Qendra e komunikimit e gjithe sistemit.
  # Topiket: scrape-requests, product-snapshots, price-events
  # ======================================================
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  # ======================================================
  # POSTGRESQL
  # Ruan: produktet, gjendjen aktuale, historikun e cmimeve
  # ======================================================
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
    - "5433:5432"
    environment:
      POSTGRES_DB: pricemonitor
      POSTGRES_USER: pricemonitor
      POSTGRES_PASSWORD: pricemonitor
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
